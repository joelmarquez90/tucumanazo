<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TUCUMANAZO - El Juego</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a0a00;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: monospace;
      touch-action: none;
    }
    #gameCanvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: pointer;
    }
    #landscape-hint { display: none; }
  </style>
</head>
<body>
  <div id="landscape-hint"></div>
  <canvas id="gameCanvas"></canvas>

  <script>
  (function() {
    // ─── CONSTANTS ────────────────────────────────────────────────────
    let CANVAS_W = window.innerWidth;
    let CANVAS_H = window.innerHeight;

    const SPRITE_NAMES = [
      'idle_player','idle_enemy',
      'approach_player','approach_enemy',
      'windup_player','windup_enemy',
      'impact1_player','impact1_enemy',
      'blood_player','blood_enemy',
      'stagger_player','stagger_enemy',
      'ko_player','ko_enemy',
      'player_walk_0','player_walk_1','player_walk_2','player_walk_3',
      'player_walk_4','player_walk_5','player_walk_6','player_walk_7',
      'enemy_walk_0','enemy_walk_1','enemy_walk_2','enemy_walk_3',
      'enemy_walk_4','enemy_walk_5','enemy_walk_6','enemy_walk_7',
    ];

    // ─── CANVAS SETUP ─────────────────────────────────────────────────
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function updateLayout() {
      CANVAS_W = window.innerWidth;
      CANVAS_H = window.innerHeight;
      canvas.width  = CANVAS_W;
      canvas.height = CANVAS_H;
      PLAYER_X    = Math.round(CANVAS_W * 0.22);
      GROUND_Y    = Math.round(CANVAS_H * 0.87);
      const charH = CANVAS_H * 0.40;   // characters ≈ 40% of screen height
      PLAYER_SCALE = charH / 620;       // sprites are ~620 px tall
      ENEMY_SCALE  = PLAYER_SCALE;
    }
    window.addEventListener('resize', () => { updateLayout(); initTrees(); });

    // ─── SPRITE LOADING ───────────────────────────────────────────────
    let sprites = {}; // { name: HTMLImageElement }
    let spriteReady = false;

    function loadSprites(cb) {
      let loaded = 0;
      let failed = false;
      for (const name of SPRITE_NAMES) {
        const img = new Image();
        img.onload = function() {
          sprites[name] = img;
          if (++loaded === SPRITE_NAMES.length) { spriteReady = true; cb(); }
        };
        img.onerror = function() {
          if (!failed) { failed = true; spriteReady = false; cb(); }
        };
        img.src = `assets/sprites/${name}.png`;
      }
    }

    // Draw a named sprite onto the main canvas
    // dx,dy = dest position (center-bottom of sprite)
    // scale = display scale
    // flip = mirror horizontally
    function drawSprite(name, dx, dy, scale, flip) {
      const img = sprites[name];
      if (!img) return;
      const dw = img.naturalWidth * scale;
      const dh = img.naturalHeight * scale;
      ctx.save();
      if (flip) {
        ctx.translate(dx, dy);
        ctx.scale(-1, 1);
        ctx.drawImage(img, -dw/2, -dh, dw, dh);
      } else {
        ctx.drawImage(img, dx - dw/2, dy - dh, dw, dh);
      }
      ctx.restore();
    }

    function drawWalkFrame(frame, dx, dy, scale, flip) {
      const prefix = flip ? 'enemy_walk' : 'player_walk';
      drawSprite(`${prefix}_${frame}`, dx, dy, scale, flip);
    }

    // ─── GAME STATE ───────────────────────────────────────────────────
    const STATE = {
      LOADING: 'LOADING',
      TITLE: 'TITLE',
      WALKING: 'WALKING',
      ENCOUNTER: 'ENCOUNTER',
      TIMING: 'TIMING',
      HEADBUTT: 'HEADBUTT',
      KO: 'KO',
      MISS: 'MISS',
      GAME_OVER: 'GAME_OVER',
    };

    let state = STATE.LOADING;
    let score = 0;
    let lives = 3;
    let kills = 0;
    let combo = 0;
    let highScore = parseInt(localStorage.getItem('tucumanazo_hs') || '0');
    let stateTimer = 0;
    let lastTime = 0;
    let walkFrame = 0;
    let walkTimer = 0;

    // Headbutt animation sequence
    const HEADBUTT_FRAMES = ['windup','impact1','blood','stagger','ko'];
    let headbuttStep = 0;
    let headbuttTimer = 0;
    const HEADBUTT_TIMINGS = [120, 100, 120, 150, 300]; // ms per frame

    // Enemy state
    let enemy = null; // { x, speed, scale, frame }
    let enemySpawnTimer = 0;

    // Player position — computed dynamically in updateLayout()
    let PLAYER_X = 0;
    let GROUND_Y = 0;
    let PLAYER_SCALE = 0;
    let ENEMY_SCALE = 0;
    updateLayout(); // set canvas size + layout vars before anything else

    // Background
    let bgScroll = 0;
    let treesLayers = [];
    initTrees();

    // Particles / hit effects
    let particles = [];

    // Title animation
    let titleBob = 0;

    // Miss window = how long TIMING state lasts before becoming MISS
    function getMissDelay() {
      return Math.max(350, 900 - Math.floor(kills / 5) * 80);
    }
    // Enemy speed (increases with kills, scaled to canvas width)
    function getEnemySpeed() {
      return (350 + Math.floor(kills / 5) * 40) * CANVAS_W / 800;
    }

    // ─── TREES ────────────────────────────────────────────────────────
    function initTrees() {
      treesLayers = [];
      for (let layer = 0; layer < 2; layer++) {
        const trees = [];
        for (let i = 0; i < 8; i++) {
          trees.push({
            x: Math.random() * CANVAS_W * 2,
            h: ((layer === 0 ? 60 : 40) + Math.random() * 40) * CANVAS_H / 450,
            w: ((layer === 0 ? 30 : 20) + Math.random() * 20) * CANVAS_H / 450,
          });
        }
        treesLayers.push({ trees, speed: layer === 0 ? 0.4 : 0.2 });
      }
    }

    // ─── PARTICLES ────────────────────────────────────────────────────
    function spawnParticles(x, y) {
      for (let i = 0; i < 12; i++) {
        particles.push({
          x, y,
          vx: (Math.random() - 0.5) * 200,
          vy: -Math.random() * 250 - 50,
          life: 0.8 + Math.random() * 0.4,
          maxLife: 0.8 + Math.random() * 0.4,
          r: Math.floor(Math.random() * 2) * 3 + 3,
          color: Math.random() < 0.7 ? '#cc0000' : '#ff4400',
        });
      }
    }

    // ─── GAME LOGIC ───────────────────────────────────────────────────
    function startGame() {
      state = STATE.WALKING;
      score = 0;
      lives = 3;
      kills = 0;
      combo = 0;
      stateTimer = 0;
      enemy = null;
      particles = [];
      enemySpawnTimer = 500;
    }

    function spawnEnemy() {
      enemy = {
        x: CANVAS_W + 80,
        speed: getEnemySpeed(),
        animFrame: 0,
        animTimer: 0,
      };
    }

    function doHeadbutt() {
      if (state === STATE.TIMING) {
        state = STATE.HEADBUTT;
        headbuttStep = 0;
        headbuttTimer = 0;
        combo++;
        const comboBonus = combo > 1 ? combo * 10 : 0;
        score += 100 + comboBonus;
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('tucumanazo_hs', highScore);
        }
        spawnParticles(PLAYER_X + 100, GROUND_Y - 80);
      }
    }

    function doMiss() {
      state = STATE.MISS;
      stateTimer = 0;
      combo = 0;
      lives--;
      if (lives <= 0) {
        setTimeout(() => {
          state = STATE.GAME_OVER;
          stateTimer = 0;
        }, 600);
      } else {
        setTimeout(() => {
          enemy = null;
          state = STATE.WALKING;
          stateTimer = 0;
          enemySpawnTimer = 600;
        }, 600);
      }
    }

    // ─── UPDATE ───────────────────────────────────────────────────────
    function update(dt) {
      titleBob += dt * 3;

      // Scroll background
      if (state === STATE.WALKING || state === STATE.ENCOUNTER || state === STATE.TIMING) {
        bgScroll += dt * 60;
      }
      for (const layer of treesLayers) {
        for (const t of layer.trees) {
          t.x -= dt * 60 * layer.speed;
          if (t.x + t.w < 0) t.x = CANVAS_W + Math.random() * 200;
        }
      }

      // Walk animation (faster when enemy is approaching)
      const walkSpeed = (state === STATE.ENCOUNTER) ? 60 : 80;
      walkTimer += dt * 1000;
      if (walkTimer > walkSpeed) {
        walkTimer = 0;
        walkFrame = (walkFrame + 1) % 8;
      }

      // Particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 400 * dt; // gravity
        p.life -= dt;
        if (p.life <= 0) particles.splice(i, 1);
      }

      // State machine
      switch (state) {
        case STATE.WALKING:
          enemySpawnTimer -= dt * 1000;
          if (enemySpawnTimer <= 0) {
            spawnEnemy();
            state = STATE.ENCOUNTER;
          }
          break;

        case STATE.ENCOUNTER:
          // Enemy walks toward player
          if (enemy) {
            enemy.x -= enemy.speed * dt;
            enemy.animTimer += dt * 1000;
            if (enemy.animTimer > 200) {
              enemy.animTimer = 0;
              enemy.animFrame = 1 - enemy.animFrame;
            }
            // When enemy reaches timing zone
            if (enemy.x < PLAYER_X + CANVAS_W * 0.16) {
              state = STATE.TIMING;
              stateTimer = 0;
            }
          }
          break;

        case STATE.TIMING:
          stateTimer += dt * 1000;
          if (stateTimer > getMissDelay()) {
            doMiss();
          }
          break;

        case STATE.HEADBUTT:
          headbuttTimer += dt * 1000;
          if (headbuttTimer >= HEADBUTT_TIMINGS[headbuttStep]) {
            headbuttTimer = 0;
            headbuttStep++;
            if (headbuttStep >= HEADBUTT_FRAMES.length) {
              // Done
              state = STATE.KO;
              stateTimer = 0;
              kills++;
            }
          }
          break;

        case STATE.KO:
          stateTimer += dt * 1000;
          if (stateTimer > 500) {
            enemy = null;
            state = STATE.WALKING;
            enemySpawnTimer = Math.max(300, 700 - kills * 15);
          }
          break;

        case STATE.MISS:
          stateTimer += dt * 1000;
          break;
      }
    }

    // ─── DRAW ─────────────────────────────────────────────────────────
    function drawBackground() {
      // Sky gradient
      const skyGrad = ctx.createLinearGradient(0, 0, 0, CANVAS_H * 0.65);
      skyGrad.addColorStop(0, '#7ec8e3');
      skyGrad.addColorStop(0.6, '#b0d8e8');
      skyGrad.addColorStop(1, '#d4e8c2');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H * 0.65);

      // Far trees (back layer)
      for (const layer of [...treesLayers].reverse()) {
        for (const t of layer.trees) {
          // Trunk
          ctx.fillStyle = layer === treesLayers[0] ? '#5a3e1b' : '#7a5530';
          const trunkW = t.w * 0.25;
          const trunkH = t.h * 0.4;
          ctx.fillRect(t.x + t.w/2 - trunkW/2, CANVAS_H * 0.65 - trunkH, trunkW, trunkH);
          // Foliage (3 circles for pixel feel)
          ctx.fillStyle = layer === treesLayers[0] ? '#2d6a2d' : '#3a8a3a';
          ctx.beginPath();
          ctx.arc(t.x + t.w/2, CANVAS_H * 0.65 - trunkH - t.h * 0.35, t.w * 0.4, 0, Math.PI*2);
          ctx.fill();
          ctx.fillStyle = layer === treesLayers[0] ? '#1e5c1e' : '#2e7a2e';
          ctx.beginPath();
          ctx.arc(t.x + t.w/2 - t.w*0.2, CANVAS_H * 0.65 - trunkH - t.h * 0.2, t.w * 0.32, 0, Math.PI*2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(t.x + t.w/2 + t.w*0.2, CANVAS_H * 0.65 - trunkH - t.h * 0.2, t.w * 0.32, 0, Math.PI*2);
          ctx.fill();
        }
      }

      // Ground
      ctx.fillStyle = '#4a4a4a';
      ctx.fillRect(0, CANVAS_H * 0.65, CANVAS_W, CANVAS_H * 0.35);

      // Sidewalk line
      ctx.fillStyle = '#5a5a5a';
      ctx.fillRect(0, CANVAS_H * 0.65, CANVAS_W, 8);

      // Dashed center line
      ctx.setLineDash([30, 20]);
      ctx.strokeStyle = '#ffffff44';
      ctx.lineWidth = 3;
      ctx.beginPath();
      const lineY = CANVAS_H * 0.65 + CANVAS_H * 0.18;
      ctx.moveTo(0, lineY);
      ctx.lineTo(CANVAS_W, lineY);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    function drawPlaceholderChar(x, y, color, flip, label) {
      // Draw simple stick figure as fallback when sprites aren't loaded
      ctx.save();
      if (flip) { ctx.translate(x, y); ctx.scale(-1, 1); ctx.translate(-x, -y); }
      ctx.fillStyle = color;
      ctx.strokeStyle = color;
      ctx.lineWidth = 4;
      // Head
      ctx.beginPath();
      ctx.arc(x, y - 90, 18, 0, Math.PI * 2);
      ctx.fill();
      // Body
      ctx.beginPath();
      ctx.moveTo(x, y - 72);
      ctx.lineTo(x, y - 30);
      ctx.stroke();
      // Arms
      ctx.beginPath();
      ctx.moveTo(x - 24, y - 55);
      ctx.lineTo(x + 24, y - 55);
      ctx.stroke();
      // Legs
      ctx.beginPath();
      ctx.moveTo(x, y - 30);
      ctx.lineTo(x - 16, y);
      ctx.moveTo(x, y - 30);
      ctx.lineTo(x + 16, y);
      ctx.stroke();
      if (label) {
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 11px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(label, x, y - 110);
      }
      ctx.restore();
    }

    function drawPlayer(sprName) {
      if (spriteReady) {
        drawSprite(`${sprName}_player`, PLAYER_X, GROUND_Y, PLAYER_SCALE, false);
      } else {
        drawPlaceholderChar(PLAYER_X, GROUND_Y, '#e8c060', false, 'PLAYER');
      }
    }

    function drawPlayerWalk() {
      if (spriteReady) {
        drawWalkFrame(walkFrame, PLAYER_X, GROUND_Y, PLAYER_SCALE, false);
      } else {
        drawPlaceholderChar(PLAYER_X, GROUND_Y, '#e8c060', false);
      }
    }

    function drawEnemy(sprName, flip) {
      if (!enemy) return;
      if (spriteReady) {
        if (sprName === 'walk') {
          drawWalkFrame(enemy.animFrame, enemy.x, GROUND_Y, ENEMY_SCALE, true);
        } else {
          // _enemy sprites are already facing left (toward player) — no flip
          drawSprite(`${sprName}_enemy`, enemy.x, GROUND_Y, ENEMY_SCALE, false);
        }
      } else {
        drawPlaceholderChar(enemy.x, GROUND_Y, '#cc4040', true);
      }
    }

    function drawParticles() {
      for (const p of particles) {
        const alpha = p.life / p.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.r/2, p.y - p.r/2, p.r, p.r);
      }
      ctx.globalAlpha = 1;
    }

    function drawHUD() {
      // Score
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 20px monospace';
      ctx.textAlign = 'left';
      ctx.fillText('SCORE: ' + score, 10, 28);
      ctx.font = '13px monospace';
      ctx.fillStyle = '#ffdd88';
      ctx.fillText('MEJOR: ' + highScore, 10, 46);

      // Lives
      ctx.textAlign = 'right';
      ctx.font = '22px monospace';
      let heartsStr = '';
      for (let i = 0; i < 3; i++) {
        heartsStr += i < lives ? '❤️' : '🖤';
      }
      ctx.fillText(heartsStr, CANVAS_W - 10, 28);

      // Kills counter
      ctx.font = '13px monospace';
      ctx.fillStyle = '#aaffaa';
      ctx.fillText('KOs: ' + kills, CANVAS_W - 10, 46);

      // Combo
      if (combo > 1 && (state === STATE.WALKING || state === STATE.ENCOUNTER || state === STATE.HEADBUTT)) {
        ctx.textAlign = 'center';
        ctx.font = 'bold 18px monospace';
        ctx.fillStyle = '#ffff00';
        ctx.fillText('COMBO x' + combo + '!', CANVAS_W/2, 35);
      }

      // Difficulty
      const level = Math.floor(kills / 5) + 1;
      ctx.textAlign = 'left';
      ctx.font = '11px monospace';
      ctx.fillStyle = '#ffaa55';
      ctx.fillText('LVL ' + level, 10, CANVAS_H - 8);
    }

    function drawTimingIndicator() {
      if (state !== STATE.TIMING) return;
      const pulse = Math.abs(Math.sin(Date.now() / 120)) ;
      const scale = 1 + pulse * 0.15;
      ctx.save();
      ctx.translate(CANVAS_W / 2, CANVAS_H * 0.28);
      ctx.scale(scale, scale);
      ctx.textAlign = 'center';
      ctx.font = 'bold 38px monospace';
      ctx.fillStyle = `rgba(255, ${Math.floor(200 + pulse * 55)}, 0, ${0.85 + pulse * 0.15})`;
      ctx.shadowColor = '#ff0000';
      ctx.shadowBlur = 20;
      ctx.fillText('¡TUCUMANAZO!', 0, 0);
      ctx.shadowBlur = 0;

      // Sub hint
      ctx.font = '16px monospace';
      ctx.fillStyle = '#fff';
      ctx.fillText('ESPACIO / TAP', 0, 30);
      ctx.restore();

      // Timer bar
      const progress = 1 - Math.min(stateTimer / getMissDelay(), 1);
      const barW = 200;
      ctx.fillStyle = '#333';
      ctx.fillRect(CANVAS_W/2 - barW/2, CANVAS_H * 0.35, barW, 10);
      const barColor = progress > 0.4 ? '#00ff44' : progress > 0.2 ? '#ffaa00' : '#ff2200';
      ctx.fillStyle = barColor;
      ctx.fillRect(CANVAS_W/2 - barW/2, CANVAS_H * 0.35, barW * progress, 10);
    }

    function drawMissIndicator() {
      if (state !== STATE.MISS) return;
      ctx.save();
      ctx.textAlign = 'center';
      ctx.font = 'bold 36px monospace';
      ctx.fillStyle = '#ff2222';
      ctx.shadowColor = '#ff0000';
      ctx.shadowBlur = 15;
      ctx.fillText('¡LO ESQUIVÓ!', CANVAS_W/2, CANVAS_H * 0.3);
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    function drawTitleScreen() {
      // Dark overlay
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

      // Title
      const bob = Math.sin(titleBob) * 6;
      ctx.save();
      ctx.textAlign = 'center';
      ctx.font = 'bold 72px monospace';
      ctx.fillStyle = '#ffdd00';
      ctx.shadowColor = '#ff6600';
      ctx.shadowBlur = 30;
      ctx.fillText('TUCUMANAZO', CANVAS_W/2, 120 + bob);
      ctx.shadowBlur = 0;

      ctx.font = 'bold 22px monospace';
      ctx.fillStyle = '#ffffff';
      ctx.fillText('EL JUEGO', CANVAS_W/2, 155 + bob);

      ctx.font = '16px monospace';
      ctx.fillStyle = '#ffdd88';
      ctx.fillText('Mejor puntaje: ' + highScore, CANVAS_W/2, 200);

      // Pulsing start text
      const pulse = Math.abs(Math.sin(Date.now() / 500));
      ctx.font = 'bold 24px monospace';
      ctx.fillStyle = `rgba(255,255,255,${0.6 + pulse * 0.4})`;
      ctx.fillText('ESPACIO / TAP para empezar', CANVAS_W/2, 310);

      ctx.font = '14px monospace';
      ctx.fillStyle = '#aaaaaa';
      ctx.fillText('Presioná en el momento justo para dar el', CANVAS_W/2, 360);
      ctx.fillStyle = '#ffdd00';
      ctx.fillText('¡TUCUMANAZO!', CANVAS_W/2, 382);
      ctx.restore();
    }

    function drawGameOver() {
      ctx.fillStyle = 'rgba(0,0,0,0.72)';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
      ctx.save();
      ctx.textAlign = 'center';
      ctx.font = 'bold 60px monospace';
      ctx.fillStyle = '#ff2222';
      ctx.shadowColor = '#ff0000';
      ctx.shadowBlur = 25;
      ctx.fillText('GAME OVER', CANVAS_W/2, 150);
      ctx.shadowBlur = 0;
      ctx.font = 'bold 28px monospace';
      ctx.fillStyle = '#ffffff';
      ctx.fillText('Puntaje: ' + score, CANVAS_W/2, 205);
      ctx.fillText('KOs: ' + kills, CANVAS_W/2, 240);
      if (score >= highScore && score > 0) {
        ctx.font = 'bold 22px monospace';
        ctx.fillStyle = '#ffdd00';
        ctx.fillText('¡NUEVO RECORD!', CANVAS_W/2, 278);
      }
      const pulse = Math.abs(Math.sin(Date.now() / 500));
      ctx.font = 'bold 22px monospace';
      ctx.fillStyle = `rgba(255,255,255,${0.5 + pulse * 0.5})`;
      ctx.fillText('ESPACIO / TAP para reintentar', CANVAS_W/2, 340);
      ctx.restore();
    }

    function render() {
      ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
      drawBackground();

      // Draw characters based on game state
      switch(state) {
        case STATE.TITLE:
          // Show player walking on title
          drawPlayerWalk();
          drawTitleScreen();
          break;

        case STATE.WALKING:
          drawPlayerWalk();
          break;

        case STATE.ENCOUNTER:
          drawPlayerWalk();
          drawEnemy('walk', true);
          break;

        case STATE.TIMING:
          drawPlayer('approach');
          drawEnemy('idle', true);
          drawTimingIndicator();
          break;

        case STATE.HEADBUTT: {
          const frameName = HEADBUTT_FRAMES[Math.min(headbuttStep, HEADBUTT_FRAMES.length - 1)];
          // During headbutt animation, player moves toward enemy
          if (headbuttStep <= 1) {
            drawPlayer('windup');
          } else {
            drawPlayer('impact1');
          }
          if (headbuttStep < 4) {
            drawEnemy(frameName === 'windup' || frameName === 'impact1' ? 'approach' : frameName, true);
          } else {
            drawEnemy('stagger', true);
          }
          drawParticles();
          break;
        }

        case STATE.KO:
          drawPlayerWalk();
          drawEnemy('ko', true);
          drawParticles();
          break;

        case STATE.MISS:
          drawPlayerWalk();
          drawEnemy('idle', true);
          drawMissIndicator();
          break;

        case STATE.GAME_OVER:
          drawPlayerWalk();
          drawGameOver();
          break;
      }

      if (state !== STATE.TITLE && state !== STATE.GAME_OVER && state !== STATE.LOADING) {
        drawHUD();
      }
    }

    // ─── MAIN LOOP ────────────────────────────────────────────────────
    function loop(timestamp) {
      const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
      lastTime = timestamp;
      if (state !== STATE.LOADING) {
        update(dt);
        render();
      }
      requestAnimationFrame(loop);
    }

    // ─── INPUT ────────────────────────────────────────────────────────
    function handleAction() {
      if (state === STATE.TITLE) {
        startGame();
      } else if (state === STATE.GAME_OVER) {
        startGame();
      } else if (state === STATE.TIMING) {
        doHeadbutt();
      }
    }

    document.addEventListener('keydown', function(e) {
      if (e.code === 'Space' || e.code === 'Enter') {
        e.preventDefault();
        handleAction();
      }
    });

    canvas.addEventListener('click', handleAction);
    canvas.addEventListener('touchstart', function(e) {
      e.preventDefault();
      handleAction();
    }, { passive: false });

    // ─── INIT ─────────────────────────────────────────────────────────
    // Loading screen
    ctx.fillStyle = '#1a0a00';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.fillStyle = '#ffdd00';
    ctx.font = 'bold 30px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Cargando...', CANVAS_W/2, CANVAS_H/2);

    loadSprites(function() {
      state = STATE.TITLE;
      lastTime = performance.now();
      requestAnimationFrame(loop);
    });

  })();
  </script>
</body>
</html>
